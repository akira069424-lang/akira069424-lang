    <style>
        :root {
            --main-bg: #f0f2f5;
            --header-bg: #2c3e50;
            --accent-red: #e74c3c;
            --edit-blue: #3498db;
            --save-green: #27ae60;
            --card-white: #ffffff;
        }
        /* hを足してね→ttps://docs.google.com/spreadsheets/d/1xLC57R7gsfqrLi-x_S1iTszZrbzG41o9SCUGNInhT1U/edit */

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: var(--main-bg);
            color: #333;
            scroll-behavior: smooth;
        }

        header {
            background-color: var(--header-bg);
            color: white;
            padding: 30px 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-title {
            font-family: "Yu Mincho", serif;
            font-size: 2.2rem;
            display: block;
            margin-bottom: 20px;
        }

        .search-container {
            display: flex;
            justify-content: center;
            max-width: 450px;
            margin: 0 auto;
            gap: 8px;
        }

        .search-box {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .search-btn {
            padding: 10px 25px;
            background-color: var(--accent-red);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;

    <script>
        // --- 1. 設定 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCIQakWMw5NCKVcP7cxwwkVbV90Rv-XS_VOwDSiIajqN7hfhOtrIbd-ZtPr_LIIZ2B/exec";

        let isEditMode = false;
        let localKansouData = [];
        let localWarmData = { date: "", members: [] };
        let localPrintData = [];

        // --- 2. 初期読み込み ---
        async function loadData() {
            try {
                // 予定データの読み込み
                const resYotei = await fetch(`${GAS_URL}?sheetName=yotei`);
                const yoteiData = await resYotei.json();
                const tbody = document.getElementById('calendarBody');
                if (tbody) {
                    tbody.innerHTML = "";
                    if (yoteiData && yoteiData.length > 0) {
                        yoteiData.forEach(item => addRow(item.date, item.text));
                    } else {
                        addRow("", "");
                    }
                }

                // 感想データの読み込み
                const resKansou = await fetch(`${GAS_URL}?sheetName=kansou`);
                localKansouData = await resKansou.json();
                renderKansou();

                // warmセクションの読み込み
                const resWarm = await fetch(`${GAS_URL}?sheetName=warm`);
                const warmData = await resWarm.json();
                if (warmData && warmData.members) {
                    localWarmData = warmData;
                }
                renderWarm();

                // 印刷物データの読み込み
                const resPrint = await fetch(`${GAS_URL}?sheetName=print`);
                const printData = await resPrint.json();
                renderPrint(printData);

                toggleInputs(true);

                const resSiryou = await fetch(`${GAS_URL}?sheetName=siryou`);
                const siryouData = await resSiryou.json();
                if (siryouData) {
                    localSiryouData = siryouData;
                }
                // loadData関数内の適切な場所に追加
                renderSiryou(); // 画面に描画

            } catch (e) {
                console.error("Load Error:", e);
                // エラー時も最低限の描画を行う
                renderWarm();
            }
        }

        // --- 3. 共通送信関数 ---
        async function sendToGas(sheetName, data) {
            // 【チェック！】送信直前のデータを画面に表示させる
            console.log("送信データ全体:", data);
            if (data[0] && data[0].print) {
                console.log("画像データの一部:", data[0].print.substring(0, 50));
            } else if (sheetName === "print") {
                alert("画像データが空っぽのまま送られようとしています！");
            }

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    mode: "no-cors", // ← 権限エラーを回避するための設定
                    body: JSON.stringify({ sheetName: sheetName, data: data })
                });
                return true; // no-corsの場合は中身が見れないので成功とみなす
            } catch (e) {
                console.error("送信エラー:", e);
                return false;
            }
        }

        // --- 4. 予定（カレンダー）の操作 ---
        function addRow(date = "", text = "") {
            const tbody = document.getElementById('calendarBody');
            if (!tbody) return;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                            <td><input type="date" class="schedule-input" value="${date}" ${isEditMode ? '' : 'disabled'}></td>
                            <td><input type="text" class="schedule-input" value="${text}" placeholder="予定なし" ${isEditMode ? '' : 'disabled'}></td>
                            ${isEditMode ? '<td><button class="delete-item-btn" onclick="this.closest(\'tr\').remove()">削除</button></td>' : ''}
                        `;
            tbody.appendChild(tr);
        }

        function removeRow() {
            const tbody = document.getElementById('calendarBody');
            if (tbody && tbody.lastChild) tbody.removeChild(tbody.lastChild);
        }

        function toggleInputs(state) {
            document.querySelectorAll('.schedule-input').forEach(i => i.disabled = state);
        }

        // --- 5. 編集モード切替 & 検索 ---
        async function handleAction() {
            const input = document.getElementById('searchInput');
            if (!input) return;
            const query = input.value.trim();
            const statusText = document.getElementById('editStatus');

            if (query === "1100") {
                if (!isEditMode) {
                    // --- 編集モード開始 ---
                    isEditMode = true;

                    // メールアドレス一覧を読み込んで表示
                    await loadMailSettings();
                    const mailBox = document.getElementById('mail-settings');
                    if (mailBox) mailBox.style.display = "block";

                    if (statusText) {
                        statusText.innerText = "● 編集モード：終了時に自動保存されます";
                        statusText.style.color = "#27ae60";
                    }

                    // 各編集メニューを表示
                    ['editMenu', 'feedbackEditMenu', 'warmEditMenu', 'siryouEditMenu'].forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.style.display = "block";
                    });

                    document.getElementById('schedule')?.classList.add('editing');
                    toggleInputs(false); // 入力欄を有効化

                    // 削除ボタンなどを再描画
                    renderKansou();
                    renderWarm();
                    renderPrint();
                    renderSiryou();

                    alert("編集モードになりました。");

                } else {
                    // --- 編集モード終了（閲覧モードへ） ---
                    isEditMode = false;

                    // メール設定画面を非表示にする
                    const mailBox = document.getElementById('mail-settings');
                    if (mailBox) mailBox.style.display = "none";

                    if (statusText) {
                        statusText.innerText = "【閲覧モード】";
                        statusText.style.color = "";
                    }

                    // 各編集メニューを非表示
                    ['editMenu', 'feedbackEditMenu', 'warmEditMenu', 'siryouEditMenu'].forEach(id => {
                        const el = document.getElementById(id);
                        if (el) el.style.display = "none";
                    });

                    document.getElementById('schedule')?.classList.remove('editing');
                    toggleInputs(true); // 入力欄をロック

                    // 予定（カレンダー）のデータ収集
                    const yoteiRows = [];
                    document.querySelectorAll('#calendarBody tr').forEach(tr => {
                        const inputs = tr.querySelectorAll('input');
                        if (inputs.length >= 2 && (inputs[0].value || inputs[1].value)) {
                            yoteiRows.push({ date: inputs[0].value, text: inputs[1].value });
                        }
                    });

                    // Warmの日付取得
                    const warmDateInput = document.getElementById('warmDateInput');
                    if (warmDateInput) localWarmData.date = warmDateInput.value;

                    // 全データを一括保存
                    const results = await Promise.all([
                        sendToGas("yotei", yoteiRows),
                        sendToGas("warm", localWarmData),
                        sendToGas("kansou", localKansouData),
                        sendToGas("siryou", localSiryouData), // 資料データの保存
                        sendToGas("mail", localMailList)      // メールリストの保存
                    ]);

                    if (results.every(r => r === true)) {
                        alert("すべてのデータを保存しました。");
                    } else {
                        alert("一部データの保存に失敗しました。");
                    }

                    // 閲覧モード用に再描画
                    renderKansou();
                    renderWarm();
                    renderPrint();
                    renderSiryou();
                }
            } else if (query !== "") {
                // 1100以外の入力は検索（ジャンプ）機能として動作
                smartWarp(query);
            }
            input.value = "";
        }

        // --- 6. あったかいんだからぁ～ 描画 ---
        // --- 6. あったかいんだからぁ～ 描画 ---
        function renderWarm() {
            const dateCon = document.getElementById('warmDateContainer');
            const membCon = document.getElementById('warmMemberContainer');
            if (!dateCon || !membCon) return;

            // 日付のフォーマットと曜日計算
            let displayDate = localWarmData.date || '';
            let dateString = '未設定';

            if (displayDate) {
                // Tが含まれる場合やハイフン区切りの文字列から日付オブジェクトを作成
                const d = new Date(displayDate.split('T')[0]);

                // 1日分足す処理（タイムゾーンによる前日ズレの補正）
                d.setDate(d.getDate() + 1);

                const year = d.getFullYear();
                const month = d.getMonth() + 1;
                const day = d.getDate();
                const dayOfWeek = ["日", "月", "火", "水", "木", "金", "土"][d.getDay()];

                // 表示用の文字列を作成 (例: 2026-03-04 (水))
                dateString = `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')} (${dayOfWeek})`;

                // input[type="date"]用の値 (YYYY-MM-DD)
                displayDate = `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
            }

            dateCon.innerHTML = isEditMode
                ? `日付：<input type="date" id="warmDateInput" value="${displayDate}" class="schedule-input" style="width:200px;">`
                : `<p><strong>更新日：${dateString}</strong></p>`;

            membCon.innerHTML = '';
            localWarmData.members.forEach((m, idx) => {
                const div = document.createElement('div');
                div.style.cssText = "border:1px solid #ddd; padding:10px; border-radius:8px; background:#fff;";
                if (isEditMode) {
                    div.innerHTML = `${m.name} <button class="delete-item-btn" onclick="deleteWarmMember(${idx})">✖</button>`;
                } else {
                    div.innerHTML = `
                                    <button class="toggle-btn" onclick="toggleWarmInput(${idx})">${m.name} ▽</button>
                                    <div id="warmInputWrapper-${idx}" style="display:none; margin-top:5px;">
                                        <textarea id="warmText-${idx}" class="feedback-input" style="height:150px;">${m.text || ''}</textarea>
                                        <button class="submit-btn" onclick="saveWarmText(${idx})">保存</button>
                                    </div>
                                `;
                }
                membCon.appendChild(div);
            });
        }

        function addWarmMember() {
            const input = document.getElementById('newNameInput');
            if (input && input.value.trim()) {
                localWarmData.members.push({ name: input.value.trim(), text: "" });
                input.value = "";
                renderWarm();
            }
        }

        function deleteWarmMember(idx) {
            if (confirm("本当に削除しますか？")) {
                localWarmData.members.splice(idx, 1);
                renderWarm();
            }
        }

        function toggleWarmInput(idx) {
            const el = document.getElementById(`warmInputWrapper-${idx}`);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        async function saveWarmText(idx) {
            localWarmData.members[idx].text = document.getElementById(`warmText-${idx}`).value;
            const success = await sendToGas("warm", localWarmData);
            if (success) alert(`${localWarmData.members[idx].name}さんの内容を保存しました`);
        }

        // --- 7. 感想 描画 ---
        function renderKansou() {
            const container = document.getElementById('feedbackContainer');
            if (!container) return;
            container.innerHTML = '';
            localKansouData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'feedback-section-item';
                div.innerHTML = `
                                <div class="feedback-header" onclick="toggleSection(${index})" style="cursor:pointer; background:#fff; border:1px solid #ddd; padding:15px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between;">
                                    <strong>${item.title}</strong> <span>▼</span>
                                </div>
                                <div id="sectionContent-${index}" style="display:none; padding:15px; background:white; border:1px solid #eee; border-radius:8px; margin-bottom:20px;">
                                    ${isEditMode ? `<button class="delete-item-btn" onclick="deleteFeedbackItem(${index})">項目を削除</button>` : ''}
                                    <div class="feedback-form">
                                        <input type="text" class="feedback-input" id="name-${index}" placeholder="名前" oninput="checkInputs(${index})">
                                        <textarea class="feedback-input" id="good-${index}" placeholder="良かった点" oninput="checkInputs(${index})"></textarea>
                                        <textarea class="feedback-input" id="bad-${index}" placeholder="悪かったところ" oninput="checkInputs(${index})"></textarea>
                                        <textarea class="feedback-input" id="improve-${index}" placeholder="改善点" oninput="checkInputs(${index})"></textarea>
                                        <button class="submit-btn" id="submit-${index}" onclick="saveKansouItem(${index})" disabled>感想を送信</button>
                                    </div>
                                    <button onclick="toggleAnswers(${index})" id="toggleBtn-${index}" class="toggle-btn">みんなの感想を見る</button>
                                    <div id="answersWrapper-${index}" style="display:none; margin-top:10px;">${renderAnswers(item.answers, index)}</div>
                                </div>
                            `;
                container.appendChild(div);
            });
        }

        function checkInputs(index) {
            const g = (id) => document.getElementById(`${id}-${index}`).value.trim();
            const btn = document.getElementById(`submit-${index}`);
            const isValid = g('name') && g('good') && g('bad') && g('improve');
            if (btn) {
                btn.disabled = !isValid;
                btn.style.background = isValid ? "var(--edit-blue)" : "#bdc3c7";
            }
        }

        function toggleSection(index) {
            const el = document.getElementById(`sectionContent-${index}`);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function renderAnswers(answers, sectionIndex) {
            if (!answers || answers.length === 0) return '<p>まだ感想はありません。</p>';
            return answers.map((ans, ansIndex) => `
                            <div class="answer-card" style="position: relative;">
                                <strong>${ans.name}</strong><br>
                                良かった：${ans.good}<br>悪かった：${ans.bad}<br>改善：${ans.improve}
                                ${isEditMode ? `<button onclick="deleteIndividualAnswer(${sectionIndex}, ${ansIndex})" style="position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer;">×</button>` : ''}
                            </div>
                        `).join('');
        }

        async function saveKansouItem(index) {
            const g = (id) => document.getElementById(`${id}-${index}`).value.trim();
            const name = g('name');
            const newAns = { name: name, good: g('good'), bad: g('bad'), improve: g('improve') };
            const answers = localKansouData[index].answers || [];
            const idx = answers.findIndex(a => a.name === name);
            if (idx > -1) answers[idx] = newAns; else answers.push(newAns);
            localKansouData[index].answers = answers;
            await sendToGas("kansou", localKansouData);
            renderKansou();
            alert("送信しました");
        }

        async function deleteIndividualAnswer(sIdx, aIdx) {
            if (!confirm("削除しますか？")) return;
            localKansouData[sIdx].answers.splice(aIdx, 1);
            await sendToGas("kansou", localKansouData);
            renderKansou();
        }

        async function addFeedbackItem() {
            const title = prompt("新しい項目名：");
            if (title) {
                localKansouData.push({ title: title, answers: [] });
                await sendToGas("kansou", localKansouData);
                renderKansou();
            }
        }

        async function deleteFeedbackItem(index) {
            if (confirm("項目を削除しますか？")) {
                localKansouData.splice(index, 1);
                await sendToGas("kansou", localKansouData);
                renderKansou();
            }
        }

        function toggleAnswers(i) {
            const w = document.getElementById(`answersWrapper-${i}`);
            if (w) w.style.display = w.style.display === 'none' ? 'block' : 'none';
        }

        // --- 8. 印刷物セクション ---

        function renderPrint(data) {
            if (data) localPrintData = data;
            const listCon = document.getElementById('printList');
            if (!listCon) return;
            listCon.innerHTML = '';

            localPrintData.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'answer-card';

                let displayUrl = item.print || "";
                if (displayUrl.includes("drive.google.com")) {
                    const fileId = displayUrl.includes("id=") ? displayUrl.split("id=")[1] : displayUrl.split("/d/")[1].split("/")[0];
                    displayUrl = `https://docs.google.com/uc?export=view&id=${fileId}`;
                }

                div.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div>
                                    <strong>${item.name}</strong> (${item.size}) - ${item.number}枚
                                </div>
                                <div>
                                    <button class="toggle-btn" onclick="togglePrintPreview(${idx})" style="width:auto; display:inline-block; margin-right:5px;">表示/非表示</button>
                                    <button class="delete-item-btn" onclick="deletePrintItem(${idx})">削除</button>
                                </div>
                            </div>
                            <div id="printPreview-${idx}" class="print-preview-container" style="display:none; margin-top:10px;">
                                <embed src="${displayUrl}" type="application/pdf" class="print-preview-pdf" style="width:100%; height:500px;">
                            </div>
                        `;
                listCon.appendChild(div);
            });
        }

        // メール通知だけを別GASに飛ばす関数
        async function sendEmailNotification(fileName) {
            const MAIL_GAS_URL = "https://script.google.com/a/macros/fuku-c.ed.jp/s/AKfycbzeXvK_dQ6r1F2pXMpyITvZLdSyjRrgs4vOIomtiwLuecbXJtfLDKYuI7IzPGuA9PHd/exec";
            try {
                await fetch(MAIL_GAS_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ fileName: fileName })
                });
                console.log("通知リクエストを送信しました");
            } catch (e) {
                console.error("通知送信失敗:", e);
            }
        }

        // プレビューの開閉
        function togglePrintPreview(idx) {
            const el = document.getElementById(`printPreview-${idx}`);
            if (el) {
                el.style.display = (el.style.display === 'none') ? 'block' : 'none';
            }
        }

        // 削除処理
        async function deletePrintItem(idx) {
            if (!confirm("この印刷物データを削除しますか？")) return;
            localPrintData.splice(idx, 1);
            const success = await sendToGas("print", localPrintData);
            if (success) {
                alert("削除しました。");
                renderPrint();
            } else {
                alert("削除に失敗しました。");
            }
        }

        // アップロード処理
        async function uploadPrint() {
            const name = document.getElementById('printName').value;
            const number = document.getElementById('printNumber').value;
            const size = document.getElementById('printSize').value;
            const fileInput = document.getElementById('printFile');

            if (!name || !number || !size || fileInput.files.length === 0) {
                alert("すべての項目を入力してください。");
                return;
            }

            const file = fileInput.files[0];
            if (file.size > 1024 * 1024) {
                alert("画像サイズが大きすぎます。1MB以下の画像にしてください。");
                return;
            }

            const base64Data = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });

            const newItem = {
                name: name,
                number: number,
                size: size,
                print: base64Data
            };

            localPrintData.push(newItem);

            const success = await sendToGas("print", localPrintData);

            if (success) {
                // 通知を飛ばす
                await sendEmailNotification(name);
                alert("アップロード完了！通知を送りました。");
                location.reload(); // 画面を更新して最新データを反映
            } else {
                alert("保存に失敗しました。");
            }
        }

        // --- 9. 検索・スクロール制御 ---
        function smartWarp(keyword) {
            const elements = document.querySelectorAll('h3, td, strong, span, p, .feedback-header, button');
            for (let el of elements) {
                if ((el.innerText || el.textContent).includes(keyword)) {
                    window.scrollTo({ top: el.getBoundingClientRect().top + window.pageYOffset - 150, behavior: 'smooth' });
                    return;
                }
            }
            alert("見つかりませんでした。");
        }

        document.getElementById('searchButton').addEventListener('click', handleAction);
        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); handleAction(); }
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadData();
            const body = document.body;
            let savedScrollY = 0;

            function freezeScroll() { savedScrollY = window.scrollY; body.style.overflowY = 'hidden'; }
            function unfreezeScroll() { body.style.overflowY = ''; window.scrollTo(0, savedScrollY); }

            ['sheetToggleBtn', 'sheetToggleBtn2'].forEach((id, idx) => {
                const btn = document.getElementById(id);
                const wrap = document.getElementById(idx === 0 ? 'sheetWrapper' : 'sheetWrapper2');
                if (btn && wrap) {
                    btn.addEventListener('click', () => {
                        const isHidden = wrap.style.display === 'none';
                        const iframe = wrap.querySelector('iframe');
                        if (isHidden && !iframe.src) iframe.src = iframe.getAttribute('data-src');
                        wrap.style.display = isHidden ? 'block' : 'none';
                        btn.innerText = isHidden ? (idx === 0 ? 'スケジュール△' : '専門委員会チェック△') : (idx === 0 ? 'スケジュール▽' : '専門委員会チェック▽');
                    });
                    const iframe = wrap.querySelector('iframe');
                    iframe.addEventListener('mouseenter', freezeScroll);
                    iframe.addEventListener('mouseleave', unfreezeScroll);
                }
            });
        });
        let localMailList = [];

        // 1. メール一覧を読み込む
        async function loadMailSettings() {
            const response = await fetch(`${GAS_URL}?sheetName=mail`);
            localMailList = await response.json();
            renderMailList();
            document.getElementById('mail-settings').style.display = 'block';
        }

        // 2. 画面にリストを表示
        function renderMailList() {
            const container = document.getElementById('mail-list');
            container.innerHTML = localMailList.map((mail, index) => `
                <div style="margin-bottom:5px;">
                    <span>${mail}</span>
                    <button onclick="deleteEmail(${index})" style="color:red; margin-left:10px;">削除</button>
                </div>
            `).join('');
        }

        // 3. ローカルのリストに追加
        function addEmail() {
            const input = document.getElementById('new-email');
            if (input.value && input.value.includes('@')) {
                localMailList.push(input.value);
                input.value = '';
                renderMailList();
            }
        }

        // 4. ローカルのリストから削除
        function deleteEmail(index) {
            localMailList.splice(index, 1);
            renderMailList();
        }

        // 5. GASに保存（sendToGas関数を使い回す）
        async function saveMailSettings() {
            const success = await sendToGas("mail", localMailList);
            if (success) {
                alert("メール設定を保存しました。");
            }
        }
        let localSiryouData = []; // データ保持用

        // --- データの読み込み (loadData関数内に追加) ---
        // const resSiryou = await fetch(`${GAS_URL}?sheetName=siryou`);
        // localSiryouData = await resSiryou.json();
        // renderSiryou();

        // --- 資料セクションの描画 ---
        function renderSiryou() {
            const container = document.getElementById('siryouContainer');
            if (!container) return;
            container.innerHTML = '';

            localSiryouData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'feedback-section-item'; // 既存のスタイルを流用
                div.innerHTML = `
                    <div class="feedback-header" onclick="toggleSiryouSection(${index})" style="cursor:pointer; background:#fff; border:1px solid #ddd; padding:15px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between;">
                        <strong>${item.title}</strong> <span>▼</span>
                    </div>
                    <div id="siryouContent-${index}" style="display:none; padding:15px; background:white; border:1px solid #eee; border-radius:8px; margin-bottom:20px;">
                        ${isEditMode ? `<button class="delete-item-btn" onclick="deleteSiryouSection(${index})">セクションを削除</button>` : ''}

                        <div class="feedback-form">
                            <input type="text" class="feedback-input" id="s-name-${index}" placeholder="名前">
                            <input type="url" class="feedback-input" id="s-link-${index}" placeholder="リンク(URL)">
                            <textarea class="feedback-input" id="s-desc-${index}" placeholder="説明（任意）"></textarea>
                            <button class="submit-btn" onclick="saveSiryouItem(${index})">資料を送信</button>
                        </div>

                        <div id="siryouList-${index}" style="margin-top:15px;">
                            ${renderSiryouList(item.contents, index)}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 登録済み資料のリスト表示
        function renderSiryouList(contents, sIdx) {
            if (!contents || contents.length === 0) return '<p>資料はまだありません。</p>';
            return contents.map((c, cIdx) => `
                <div class="answer-card" style="position: relative; border-left: 4px solid #3498db;">
                    <strong>${c.name}</strong><br>
                    <a href="${c.link}" target="_blank" style="color:#3498db; word-break:break-all;">${c.link}</a>
                    ${c.desc ? `<p style="margin:5px 0 0; font-size:0.9em; color:#666;">${c.desc}</p>` : ''}
                    ${isEditMode ? `<button onclick="deleteSiryouContent(${sIdx}, ${cIdx})" style="position: absolute; top: 10px; right: 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; padding: 2px 8px; cursor: pointer;">×</button>` : ''}
                </div>
            `).join('');
        }

        // セクション開閉
        function toggleSiryouSection(index) {
            const el = document.getElementById(`siryouContent-${index}`);
            if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        // セクション追加
        async function addSiryouSection() {
            const title = prompt("新しい資料セクション名（例：第1回資料）：");
            if (title) {
                localSiryouData.push({ title: title, contents: [] });
                await sendToGas("siryou", localSiryouData);
                renderSiryou();
            }
        }

        // 資料アイテム保存
        async function saveSiryouItem(index) {
            const name = document.getElementById(`s-name-${index}`).value.trim();
            const link = document.getElementById(`s-link-${index}`).value.trim();
            const desc = document.getElementById(`s-desc-${index}`).value.trim();

            if (!name || !link) {
                alert("名前とリンクは必須です。");
                return;
            }

            const newItem = { name, link, desc };
            localSiryouData[index].contents.push(newItem);

            const success = await sendToGas("siryou", localSiryouData);
            if (success) {
                alert("資料を登録しました。");
                renderSiryou();
            }
        }

        // 各種削除機能
        async function deleteSiryouSection(index) {
            if (confirm("セクションごと削除しますか？")) {
                localSiryouData.splice(index, 1);
                await sendToGas("siryou", localSiryouData);
                renderSiryou();
            }
        }

        async function deleteSiryouContent(sIdx, cIdx) {
            if (confirm("この資料を削除しますか？")) {
                localSiryouData[sIdx].contents.splice(cIdx, 1);
                await sendToGas("siryou", localSiryouData);
                renderSiryou();
            }
        }
        /* --- JavaScript: 開閉の動作 --- */
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('toggle-btn');

        btn.addEventListener('click', () => {
            // 'closed' クラスを付け外しする
            sidebar.classList.toggle('closed');
        });
    </script>
