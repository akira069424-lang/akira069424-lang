<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生徒会ポータル</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <main id="content">
        <section id="home" class="page active">
            <h1>生徒会へようこそ</h1>
            <p>最新のニュースや各委員会の活動をチェックしよう。</p>
        </section>
        <section id="news" class="page">
            <h1>お知らせ</h1>
            <div class="card-container">
                <p>読み込み中...</p>
            </div>
        </section>
    </main>

    <nav class="navigation">
        <ul>
            <li class="list active" data-target="home">
                <a href="#">
                    <span class="icon"><span class="material-symbols-rounded">home</span></span>
                    <span class="text">ホーム</span>
                </a>
            </li>
            <li class="list" data-target="news">
                <a href="#">
                    <span class="icon"><span class="material-symbols-rounded">campaign</span></span>
                    <span class="text">ニュース</span>
                </a>
            </li>
            <li class="list" data-target="voice">
                <a href="#">
                    <span class="icon"><span class="material-symbols-rounded">chat_bubble</span></span>
                    <span class="text">ボイス</span>
                </a>
            </li>
            <li class="indicator"></li>
        </ul>
    </nav>

    <script src="script.js"></script>
</body>
</html>
